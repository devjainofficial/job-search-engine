# Daily job digest. Runs the worker on a schedule with no always-on server.
# Telegram is reachable from GitHub runners (unlike some local networks).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY, TELEGRAM_BOT_TOKEN
#   optional: ADZUNA_APP_ID, ADZUNA_APP_KEY
name: daily-digest

on:
  schedule:
    # 02:30 UTC = 08:00 IST. GitHub cron is UTC and best-effort (can run late).
    - cron: "30 2 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: worker
        run: pip install -r requirements.txt

      - name: Run daily digest
        working-directory: worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scripts/run_daily.py
