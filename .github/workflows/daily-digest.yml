# Daily job digest. Pings the deployed worker's /run-daily endpoint, which holds
# all the keys in its own environment, so this workflow needs NO secrets.
name: daily-digest

on:
  schedule:
    # 02:30 UTC = 08:00 IST. GitHub cron is UTC and best-effort (can run late).
    - cron: "30 2 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily run on the worker
        # --max-time covers the Render free-tier cold start (~50s) plus the run.
        run: |
          curl -fsS -X POST https://job-search-worker-jkrh.onrender.com/run-daily --max-time 280
